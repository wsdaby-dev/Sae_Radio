<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Station Météo</title>

<style>
body {
  background: #000;
  color: #00ff00;
  font-family: Arial;
  text-align: center;
}

.card {
  background: #111;
  border: 2px solid #00ff00;
  border-radius: 15px;
  padding: 20px;
  margin: 20px auto;
  width: 250px;
  box-shadow: 0 0 15px #00ff00;
}

input, button {
  background: black;
  color: #00ff00;
  border: 2px solid #00ff00;
  padding: 10px;
  margin: 10px;
}
</style>
</head>

<body>

<h1>🌡 Station Météo</h1>

<div id="loginDiv">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Mot de passe"><br>
  <button onclick="login()">Connexion</button>
</div>

<div id="app" style="display:none;">

  <button onclick="toggleLampe()" id="btnLampe">Lampe ON/OFF</button>

  <div class="card">
    <h2>Extérieur</h2>
    <p>Température : <span id="tempExt"></span> °C</p>
    <p>Humidité : <span id="humExt"></span> %</p>
  </div>

  <div class="card">
    <h2>Intérieur</h2>
    <p>Température : <span id="tempInt"></span> °C</p>
    <p>Humidité : <span id="humInt"></span> %</p>
  </div>

  <button onclick="logout()">Déconnexion</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, onValue, set, get } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJET.firebaseapp.com",
  databaseURL: "https://TON_PROJET-default-rtdb.firebaseio.com",
  projectId: "TON_PROJET"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let userRole = null;

window.login = function() {
  const email = email.value;
  const password = password.value;
  signInWithEmailAndPassword(auth, email, password);
}

window.logout = function() {
  signOut(auth);
}

onAuthStateChanged(auth, async (user) => {
  if (user) {

    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("app").style.display = "block";

    const roleSnap = await get(ref(db, "users/" + user.uid));
    userRole = roleSnap.val().role;

    if(userRole !== "admin"){
      document.getElementById("btnLampe").style.display = "none";
    }

    onValue(ref(db,"station"), (snapshot)=>{
      const data = snapshot.val();
      tempExt.innerText = data.exterieur.temperature;
      humExt.innerText = data.exterieur.humidite;
      tempInt.innerText = data.interieur.temperature;
      humInt.innerText = data.interieur.humidite;
    });

  } else {
    document.getElementById("loginDiv").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

window.toggleLampe = async function(){
  if(userRole === "admin"){
    const lampeRef = ref(db,"station/lampe");
    const snap = await get(lampeRef);
    set(lampeRef, !snap.val());
  }
}

</script>

</body>
</html>
