<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Station Météo</title>

<style>
body{
  background:#000;
  color:#00ff00;
  font-family:Arial;
  text-align:center;
}

.card{
  background:#111;
  border:2px solid #00ff00;
  border-radius:15px;
  padding:20px;
  margin:20px auto;
  width:250px;
}

input,button{
  background:black;
  color:#00ff00;
  border:2px solid #00ff00;
  padding:10px;
  margin:10px;
  border-radius:8px;
}

#app{display:none;}
#goToAccount{display:none;}
</style>
</head>

<body>

<h1>🌡 Station météo</h1>

<div id="loginDiv">
<h3>Connexion</h3>
<input id="email" type="email" placeholder="email"><br>
<input id="password" type="password" placeholder="mot de passe"><br>
<button onclick="login()">Connexion</button>
</div>

<div id="signupDiv">
<h3>Créer un compte</h3>
<input id="signupEmail" type="email" placeholder="email"><br>
<input id="signupPassword" type="password" placeholder="mot de passe"><br>
<button onclick="signup()">Inscription</button>
<button id="goToAccount" onclick="goToAccount()">Aller au compte</button>
</div>

<div id="app">

<button id="btnLampe" onclick="toggleLampe()">Lampe ON/OFF</button>

<div class="card">
<h2>Extérieur</h2>
Température : <span id="tempExt">--</span> °C<br>
Humidité : <span id="humExt">--</span> %
</div>

<div class="card">
<h2>Intérieur</h2>
Température : <span id="tempInt">--</span> °C<br>
Humidité : <span id="humInt">--</span> %
</div>

<button onclick="logout()">Déconnexion</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, onValue, set, get }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAayeCDVcmcFpX3qT126MFJMUGCE3S_xtY",
  authDomain: "saeradio-4cb75.firebaseapp.com",
  databaseURL: "https://saeradio-4cb75-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "saeradio-4cb75",
  storageBucket: "saeradio-4cb75.appspot.com",
  messagingSenderId: "88549628626",
  appId: "1:88549628626:web:0f8ae72085e727e6452b0b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let userRole = null;

window.login = function(){
signInWithEmailAndPassword(auth,email.value,password.value)
.catch(err=>alert(err.message))
}

window.signup = async function(){

try{

const userCredential = await createUserWithEmailAndPassword(auth,signupEmail.value,signupPassword.value);
const user = userCredential.user;

await set(ref(db,"users/"+user.uid),{role:"user"});

alert("Compte créé");
document.getElementById("goToAccount").style.display="inline-block";

}catch(error){

alert(error.message);

}

}

window.goToAccount=function(){

loginDiv.style.display="none";
signupDiv.style.display="none";
app.style.display="block";

}

window.logout=function(){

signOut(auth).then(()=>location.reload());

}

function initStation(user){

if(!user) return;

get(ref(db,"users/"+user.uid)).then(roleSnap=>{

userRole=roleSnap.val().role;
btnLampe.style.display=(userRole==="admin")?"inline-block":"none";

})

const stationRef=ref(db,"station");

onValue(stationRef,snapshot=>{

const data=snapshot.val()||{};

if(data.exterieur){

tempExt.innerText=data.exterieur.temperature??"--";
humExt.innerText=data.exterieur.humidite??"--";

}

if(data.interieur){

tempInt.innerText=data.interieur.temperature??"--";
humInt.innerText=data.interieur.humidite??"--";

}

})

}

onAuthStateChanged(auth,initStation);

window.toggleLampe = async function(){

if(userRole==="admin"){

const lampeRef=ref(db,"station/lampe");
const snap=await get(lampeRef);

set(lampeRef,!snap.val());

}

}

</script>

</body>
</html>
