<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Station Météo</title>

<style>
body {
  background: #000;
  color: #00ff00;
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  padding: 0;
}

h1 { margin-top: 20px; }

.card {
  background: #111;
  border: 2px solid #00ff00;
  border-radius: 15px;
  padding: 20px;
  margin: 20px auto;
  width: 320px;
  box-shadow: 0 0 15px #00ff00;
}

input, button, select {
  background: black;
  color: #00ff00;
  border: 2px solid #00ff00;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  font-size: 16px;
}

button:hover {
  background: #00ff00;
  color: black;
  cursor: pointer;
}

#app, #personalInfoDiv { display: none; }
#loginDiv, #signupDiv { margin-top: 30px; }
#goToAccount { display: block; margin: 20px auto; }
#calendarDiv { margin-top: 20px; }
</style>
</head>

<body>

<h1>🌡 Station Météo</h1>

<!-- Formulaire Login -->
<div id="loginDiv">
  <h3>Connexion</h3>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Mot de passe"><br>
  <button onclick="login()">Se connecter</button><br>
  <button onclick="loginWithGoogle()">Connexion avec Google</button>
</div>

<!-- Formulaire Inscription -->
<div id="signupDiv">
  <h3>Créer un compte</h3>
  <input type="email" id="signupEmail" placeholder="Email"><br>
  <input type="password" id="signupPassword" placeholder="Mot de passe"><br>
  <button onclick="signup()">S’inscrire</button>
</div>

<!-- Formulaire Infos personnelles -->
<div id="personalInfoDiv">
  <h3>Informations personnelles</h3>
  <input type="text" id="firstName" placeholder="Prénom"><br>
  <input type="text" id="lastName" placeholder="Nom"><br>
  <input type="number" id="age" placeholder="Âge"><br>
  <button onclick="savePersonalInfo()">Valider</button>
</div>

<!-- Aller au compte -->
<button id="goToAccount" onclick="goToAccount()">Aller au compte</button>

<!-- Interface Station Météo -->
<div id="app">
  <div class="card">
    <h2>Station Météo</h2>
    <p>Extérieur : Température <span id="tempExt">--</span>°C / Humidité <span id="humExt">--</span>%</p>
    <p>Intérieur : Température <span id="tempInt">--</span>°C / Humidité <span id="humInt">--</span>%</p>
    <button id="btnLampe" onclick="toggleLampe()">Lampe ON / OFF</button>
  </div>

  <!-- Calendrier -->
  <div id="calendarDiv" class="card">
    <h3>Consulter les données météo par date</h3>
    <input type="date" id="datePicker">
    <button onclick="loadDateData()">Voir données</button>
    <div id="dateData" style="margin-top:10px;"></div>
  </div>

  <button onclick="logout()">Déconnexion</button>
</div>

<script type="module">
// ---------- Firebase Imports ----------
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, onValue, set, get, push } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ---------- Config Firebase ----------
const firebaseConfig = {
  apiKey: "AIzaSyAayeCDVcmcFpX3qT126MFJMUGCE3S_xtY",
  authDomain: "saeradio-4cb75.firebaseapp.com",
  databaseURL: "https://saeradio-4cb75-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "saeradio-4cb75",
  storageBucket: "saeradio-4cb75.appspot.com",
  messagingSenderId: "88549628626",
  appId: "1:88549628626:web:0f8ae72085e727e6452b0b"
};

// ---------- Init Firebase ----------
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();
let userRole = null;

// ---------- Auth Functions ----------
window.login = function() {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(err => alert("Erreur connexion : " + err.message));
}

window.loginWithGoogle = async function(){
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    const userRef = ref(db, "users/" + user.uid);
    const snap = await get(userRef);
    if(!snap.exists()){
      await set(userRef, { role: "user", email: user.email, displayName: user.displayName });
    }
    loginDiv.style.display="none";
    signupDiv.style.display="none";
    personalInfoDiv.style.display="none";
    app.style.display="block";
  } catch(error) {
    alert("Erreur Google Sign-In : " + error.message);
  }
}

window.signup = async function() {
  try {
    const userCredential = await createUserWithEmailAndPassword(auth, signupEmail.value, signupPassword.value);
    signupDiv.style.display="none";
    personalInfoDiv.style.display="block";
  } catch(error) {
    alert("Erreur inscription : " + error.message);
  }
}

window.savePersonalInfo = async function() {
  const firstName = document.getElementById("firstName").value;
  const lastName = document.getElementById("lastName").value;
  const age = document.getElementById("age").value;
  const user = auth.currentUser;
  if(!user) return alert("Utilisateur non connecté !");
  
  await set(ref(db, "users/" + user.uid), {
    role: "user",
    firstName,
    lastName,
    age,
    email: user.email
  });

  personalInfoDiv.style.display = "none";
  app.style.display = "block";
}

window.goToAccount = function() {
  loginDiv.style.display="none";
  signupDiv.style.display="none";
  personalInfoDiv.style.display="none";
  app.style.display="block";
}

window.logout = function() {
  signOut(auth).then(() => location.reload());
}

// ---------- Station Météo ----------
function initStation(user){
  if(!user) return;

  // Récupérer role utilisateur
  get(ref(db, "users/" + user.uid)).then(roleSnap => {
    userRole = roleSnap.val().role;
    btnLampe.style.display = (userRole === "admin") ? "inline-block" : "none";
  });

  // Lecture station en temps réel + stockage historique
  const stationRef = ref(db,"station");
  onValue(stationRef, snapshot => {
    const data = snapshot.val() || {};
    if(data.exterieur){
      tempExt.innerText = data.exterieur.temperature ?? "--";
      humExt.innerText = data.exterieur.humidite ?? "--";
    }
    if(data.interieur){
      tempInt.innerText = data.interieur.temperature ?? "--";
      humInt.innerText = data.interieur.humidite ?? "--";
    }

    // Sauvegarde historique par date
    const today = new Date().toISOString().slice(0,10); // YYYY-MM-DD
    set(ref(db, "historique/" + today), {
      exterieur: data.exterieur || {},
      interieur: data.interieur || {}
    });
  });
}

// ---------- Lampe ----------
window.toggleLampe = async function(){
  if(userRole === "admin"){
    const lampeRef = ref(db,"station/lampe");
    const snap = await get(lampeRef);
    set(lampeRef, !snap.val());
  }
}

// ---------- Calendrier ----------
window.loadDateData = async function(){
  const date = document.getElementById("datePicker").value;
  if(!date) return alert("Choisir une date !");
  const dateRef = ref(db, "historique/" + date);
  const snap = await get(dateRef);
  if(!snap.exists()){
    dateData.innerHTML = "Pas de données pour cette date";
  } else {
    const d = snap.val();
    dateData.innerHTML = `
      <strong>Extérieur :</strong> Température ${d.exterieur.temperature}°C / Humidité ${d.exterieur.humidite}%<br>
      <strong>Intérieur :</strong> Température ${d.interieur.temperature}°C / Humidité ${d.interieur.humidite}%
    `;
  }
}

// Sur changement Auth
onAuthStateChanged(auth, initStation);

</script>
</body>
</html>
